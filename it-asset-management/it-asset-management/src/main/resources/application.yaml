spring:
  datasource:
    url: jdbc:mysql://db:3306/my_app_db?allowPublicKeyRetrieval=true&useSSL=false
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    name: it-asset-management

  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=1h  # 500 assets, 1hr TTL

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

  ai:
    ollama:
      # ⚠️ Note: If running Ollama on your host machine, 'localhost' won't work inside Docker either.
      # You may need to change this to http://host.docker.internal:11434 later.
      base-url: http://localhost:11434
      chat:
        options:
          model: phi3
          max-tokens: 1024
      embedding:
        options:
          model: phi3
      init:
        pull-model-strategy: never

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: info
    org.springframework.ai: TRACE