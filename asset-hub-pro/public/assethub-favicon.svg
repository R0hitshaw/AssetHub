<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer shield: deep navy -->
  <path d="M16 0 L32 6 L32 20 Q32 30 16 36 Q0 30 0 20 L0 6 Z" fill="#1E3A8A"/>
  <!-- Inner shield: electric blue -->
  <path d="M16 2.5 L29.5 7.8 L29.5 20 Q29.5 28.5 16 33.5 Q2.5 28.5 2.5 20 L2.5 7.8 Z" fill="#2563EB"/>
  <!-- Horizontal circuit lines -->
  <line x1="7" y1="15" x2="25" y2="15" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="21" x2="25" y2="21" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vertical circuit lines -->
  <line x1="10.5" y1="11" x2="10.5" y2="25" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16"   y1="10" x2="16"   y2="26" stroke="#BFDBFE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.5" y1="11" x2="21.5" y2="25" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nodes row 1 -->
  <circle cx="10.5" cy="15" r="2.5" fill="#FFFFFF"/>
  <circle cx="10.5" cy="15" r="1.2" fill="#2563EB"/>
  <circle cx="16"   cy="15" r="2.5" fill="#60A5FA"/>
  <circle cx="16"   cy="15" r="1.2" fill="#1E3A8A"/>
  <circle cx="21.5" cy="15" r="2.5" fill="#FFFFFF"/>
  <circle cx="21.5" cy="15" r="1.2" fill="#2563EB"/>
  <!-- Nodes row 2 -->
  <circle cx="10.5" cy="21" r="2.5" fill="#60A5FA"/>
  <circle cx="10.5" cy="21" r="1.2" fill="#1E3A8A"/>
  <circle cx="16"   cy="21" r="3.5" fill="#FFFFFF"/>
  <circle cx="16"   cy="21" r="1.8" fill="#2563EB"/>
  <circle cx="21.5" cy="21" r="2.5" fill="#60A5FA"/>
  <circle cx="21.5" cy="21" r="1.2" fill="#1E3A8A"/>
</svg>
